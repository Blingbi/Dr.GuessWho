<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doctor Who Daily Guess</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #eaf4ff;
      background:
        radial-gradient(circle at top, rgba(40, 120, 255, 0.25), transparent 35%),
        radial-gradient(circle at bottom, rgba(0, 210, 255, 0.12), transparent 40%),
        #030916;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .app {
      position: relative;
      max-width: 1000px;
      margin: 0 auto;
      padding: 28px 16px;
      text-align: center;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #8fd3ff;
      text-shadow: 0 0 18px #008cff;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #bddfff;
      margin-bottom: 24px;
    }

    .tardis-panel {
      max-width: 620px;
      margin: 0 auto 24px;
      padding: 18px;
      border: 2px solid #69b7ff;
      border-radius: 14px;
      background: rgba(5, 16, 40, 0.88);
      box-shadow: 0 0 28px rgba(0, 145, 255, 0.35);
    }

    #status {
      font-weight: bold;
      margin-bottom: 14px;
      color: #d8ecff;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    #guessInput {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      border: 2px solid #94cfff;
      background: #07142b;
      color: white;
      outline: none;
    }

    #guessInput:focus {
      box-shadow: 0 0 16px rgba(0, 170, 255, 0.5);
    }

    #submitGuess,
    #resetBtn {
      padding: 14px 18px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      background: #0b4ea2;
      box-shadow: 0 0 14px rgba(0, 140, 255, 0.3);
    }

    #submitGuess:hover,
    #resetBtn:hover {
      background: #1670d6;
    }

    #suggestions {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    .suggestion {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(145, 205, 255, 0.4);
      background: rgba(20, 50, 100, 0.95);
      color: white;
      cursor: pointer;
      text-align: left;
    }

    .suggestion:hover {
      background: rgba(35, 90, 170, 0.95);
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin: 18px 0;
      color: #d5eaff;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .box {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      display: inline-block;
    }

    .green { background: #35b56a; }
    .yellow { background: #c7b52a; }
    .red { background: #d83a3a; }

    #guesses {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }

    .guess-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      animation: popIn 0.25s ease;
    }

    .guess-name,
    .result-card {
      min-height: 76px;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.2);
      font-size: 14px;
    }

    .guess-name {
      font-weight: bold;
    }

    .correct {
      background: #35a969;
    }

    .partial {
      background: #9c9122;
    }

    .incorrect {
      background: #bd3030;
    }

    .field-label {
      font-size: 11px;
      opacity: 0.85;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .trait-details {
      text-align: left;
      padding: 12px;
      border-radius: 10px;
      background: rgba(8, 20, 45, 0.9);
      border: 1px solid rgba(120, 180, 255, 0.25);
      color: #d9ecff;
    }

    @keyframes popIn {
      from {
        transform: scale(0.98);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 800px) {
      .guess-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .search-row {
        flex-direction: column;
      }

      .logo {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="logo">DOCTOR WHO</div>
    <div class="subtitle">Daily TARDIS Character Guess</div>

    <div class="tardis-panel">
      <div id="status"></div>

      <div class="search-row">
        <input
          id="guessInput"
          placeholder="Character name, companion, villain, Doctor..."
          autocomplete="off"
        />
        <button id="submitGuess">Scan</button>
      </div>

      <div id="suggestions"></div>
    </div>

    <div class="legend">
      <span><i class="box green"></i> Correct</span>
      <span><i class="box yellow"></i> Partial</span>
      <span><i class="box red"></i> Incorrect</span>
    </div>

    <button id="resetBtn">Reset</button>

    <div id="guesses"></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
