<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doctor Who Akinator</title>

  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b1a2a, #000);
  color: #e6f1ff;
  min-height: 100dvh;
  overflow: hidden;
}

/* ---------------- TARDIS INTRO ---------------- */

.intro {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeOut 2s ease 2.5s forwards;
}

.tardis {
  width: 120px;
  height: 180px;
  background: linear-gradient(180deg, #1c3f66, #0b1a2a);
  border: 2px solid #4fc3ff;
  box-shadow: 0 0 30px #4fc3ff88;
  animation: zoomIn 2s ease;
  position: relative;
}

.tardis::before {
  content: "POLICE BOX";
  position: absolute;
  top: 6px;
  width: 100%;
  text-align: center;
  font-size: 9px;
  color: #bfe9ff;
  letter-spacing: 2px;
}

@keyframes zoomIn {
  from {
    transform: scale(0.2);
    opacity: 0;
  }

  to {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* ---------------- APP ---------------- */

.app {
  width: 100%;
  max-width: 700px;
  height: 100dvh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
  padding: 12px;
}

h1 {
  text-align: center;
  color: #7fd1ff;
  margin: 10px 0;
  font-size: 1.8rem;
  flex-shrink: 0;
}

/* ---------------- CHAT ---------------- */

.chat {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px 0;
  min-height: 0;
}

.msg {
  padding: 10px 14px;
  border-radius: 14px;
  max-width: 80%;
  line-height: 1.4;
  word-wrap: break-word;
  animation: pop 0.2s ease;
}

.ai {
  background: #1c3f66;
  border: 1px solid #4fc3ff44;
  align-self: flex-start;
}

.user {
  background: #2ecc71;
  color: #000;
  align-self: flex-end;
}

.guess {
  background: #f1c40f;
  color: #000;
  align-self: center;
  font-weight: bold;
}

#dots {
  display: inline-block;
  width: 24px;
}

@keyframes pop {
  from {
    transform: scale(0.95);
    opacity: 0;
  }

  to {
    transform: scale(1);
    opacity: 1;
  }
}

/* ---------------- BUTTONS ---------------- */

.controls {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
  padding-top: 10px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}

button {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.15s ease;
}

button:active {
  transform: scale(0.96);
}

.yes {
  background: #2ecc71;
  color: white;
}

.no {
  background: #e74c3c;
  color: white;
}

.reset {
  background: #3498db;
  color: white;
}

/* ---------------- SCROLLBAR ---------------- */

.chat::-webkit-scrollbar {
  width: 6px;
}

.chat::-webkit-scrollbar-thumb {
  background: #4fc3ff55;
  border-radius: 999px;
}

/* ---------------- MOBILE ---------------- */

@media (max-width: 600px) {
  h1 {
    font-size: 1.4rem;
  }

  .msg {
    max-width: 90%;
  }

  button {
    padding: 16px 10px;
  }
}
  </style>
</head>

<body>

  <!-- TARDIS INTRO -->
  <div class="intro">
    <div class="tardis"></div>
  </div>

  <!-- APP -->
  <div class="app">

    <h1>Doctor Who Akinator</h1>

    <div id="chat" class="chat"></div>

    <div class="controls">
      <button class="yes" onclick="yes()">Yes</button>
      <button class="no" onclick="no()">No</button>
      <button class="reset" onclick="reset()">Restart</button>
    </div>

  </div>

  <script type="module" src="./main.js"></script>

  <script>
    // smooth intro removal cleanup
    setTimeout(() => {
      document.querySelector('.intro').remove();
    }, 3000);
  </script>

</body>
</html>
