<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doctor Who Guess Who</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      gap: 20px;
      padding: 20px;

      /* TARDIS DARK SPACE THEME */
      background: radial-gradient(circle at top, #0b1a3a, #050814 70%);
      color: #e6f0ff;
      overflow: hidden;
    }

    /* subtle vortex glow */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(0, 140, 255, 0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.1), transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(0, 80, 200, 0.08), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* LAYOUT CONTAINERS */
    #chat, #board {
      position: relative;
      z-index: 1;
    }

    /* CHAT PANEL */
    #chat {
      width: 320px;
      height: 520px;
      overflow-y: auto;

      background: rgba(10, 18, 40, 0.85);
      border: 1px solid rgba(120, 180, 255, 0.25);
      border-radius: 12px;
      padding: 12px;

      box-shadow: 0 0 25px rgba(0, 140, 255, 0.15);
      backdrop-filter: blur(6px);
    }

    /* BOARD GRID */
    #board {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      align-content: start;
      height: 520px;
      overflow-y: auto;
      padding-right: 5px;
    }

    /* CHARACTER BUTTONS */
    .char-btn {
      padding: 10px;
      cursor: pointer;

      background: rgba(15, 30, 70, 0.9);
      color: #e6f0ff;

      border: 1px solid rgba(100, 170, 255, 0.3);
      border-radius: 10px;

      transition: 0.2s ease;
      box-shadow: 0 0 10px rgba(0, 120, 255, 0.08);
    }

    .char-btn:hover {
      transform: scale(1.05);
      background: rgba(30, 60, 120, 0.9);
      border-color: rgba(120, 200, 255, 0.6);
      box-shadow: 0 0 18px rgba(0, 170, 255, 0.25);
    }

    /* CHAT MESSAGES */
    .msg {
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .msg.user {
      color: #7cc7ff;
    }

    .msg.ai {
      color: #b9e1ff;
    }

    .msg.guess {
      color: #caa6ff;
    }

    /* RESET BUTTON */
    #resetBtn {
      position: fixed;
      bottom: 20px;
      left: 20px;

      padding: 10px 14px;
      cursor: pointer;

      background: #0b3d91;
      color: white;

      border: 1px solid #4aa3ff;
      border-radius: 8px;

      box-shadow: 0 0 15px rgba(0, 140, 255, 0.25);
      transition: 0.2s;
      z-index: 2;
    }

    #resetBtn:hover {
      background: #1557c0;
      box-shadow: 0 0 25px rgba(0, 170, 255, 0.4);
    }

    /* SCROLLBAR */
    #chat::-webkit-scrollbar,
    #board::-webkit-scrollbar {
      width: 6px;
    }

    #chat::-webkit-scrollbar-thumb,
    #board::-webkit-scrollbar-thumb {
      background: rgba(120, 180, 255, 0.3);
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- CHAT -->
  <div id="chat"></div>

  <!-- CHARACTER BOARD -->
  <div id="board"></div>

  <!-- RESET -->
  <button id="resetBtn" onclick="reset()">Reset</button>

  <!-- MAIN JS -->
  <script type="module" src="./main.js"></script>

</body>
</html>
